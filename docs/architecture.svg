<svg viewBox="0 0 580 520" width="580" height="520" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <marker id="a1" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#4a9eff"/>
    </marker>
    <marker id="a2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#48bb78"/>
    </marker>
    <marker id="a3" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#ed8936"/>
    </marker>
    <marker id="a4" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#9f7aea"/>
    </marker>
  </defs>

  <!-- ACP Instance boundary -->
  <rect x="20" y="10" width="540" height="500" rx="10" ry="10" 
        fill="none" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="40" y="32" font-size="11" fill="#718096" font-weight="500" font-family="system-ui">ACP Instance</text>

  <!-- 1. Agents -->
  <rect x="165" y="50" width="250" height="56" rx="8" ry="8" fill="#2d3748" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="290" y="74" text-anchor="middle" font-size="13" fill="#e2e8f0" font-weight="600" font-family="system-ui">OpenClaw Agents</text>
  <text x="290" y="93" text-anchor="middle" font-size="10.5" fill="#a0aec0" font-family="system-ui">Any agent via MCP protocol</text>

  <!-- Arrow 1→2 -->
  <line x1="290" y1="106" x2="290" y2="138" stroke="#4a9eff" stroke-width="2" marker-end="url(#a1)"/>

  <!-- 2. MCP Server -->
  <rect x="130" y="143" width="320" height="60" rx="8" ry="8" fill="#2d3748" stroke="#48bb78" stroke-width="1.5"/>
  <text x="290" y="170" text-anchor="middle" font-size="13" fill="#e2e8f0" font-weight="600" font-family="system-ui">acp-brain MCP Server</text>
  <text x="290" y="189" text-anchor="middle" font-size="10.5" fill="#68d391" font-family="system-ui">v0.3.0 · 14 tools · Safe Agent Memory</text>

  <!-- Arrow 2→3 -->
  <line x1="290" y1="203" x2="290" y2="238" stroke="#48bb78" stroke-width="2" marker-end="url(#a2)"/>

  <!-- 3. Write Policy Engine -->
  <rect x="130" y="243" width="320" height="75" rx="8" ry="8" fill="#2d3748" stroke="#ed8936" stroke-width="1.5"/>
  <text x="290" y="268" text-anchor="middle" font-size="13" fill="#e2e8f0" font-weight="600" font-family="system-ui">Write Policy Engine</text>
  <text x="290" y="288" text-anchor="middle" font-size="10.5" fill="#a0aec0" font-family="system-ui">evidence / observation → auto-approve</text>
  <text x="290" y="306" text-anchor="middle" font-size="10.5" fill="#ed8936" font-family="system-ui">instruction from agent → review queue</text>

  <!-- Review Queue (right side) -->
  <rect x="474" y="256" width="72" height="50" rx="6" ry="6" fill="#2d3748" stroke="#ed8936" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="510" y="278" text-anchor="middle" font-size="9.5" fill="#ed8936" font-weight="500" font-family="system-ui">Review</text>
  <text x="510" y="293" text-anchor="middle" font-size="9.5" fill="#ed8936" font-weight="500" font-family="system-ui">Queue</text>

  <!-- Arrow: Policy → Review Queue -->
  <line x1="450" y1="281" x2="471" y2="281" stroke="#ed8936" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- Arrow 3→4 -->
  <line x1="290" y1="318" x2="290" y2="358" stroke="#9f7aea" stroke-width="2" marker-end="url(#a4)"/>

  <!-- 4. PostgreSQL + Bedrock combined -->
  <rect x="90" y="363" width="400" height="120" rx="8" ry="8" fill="#2d3748" stroke="#9f7aea" stroke-width="1.5"/>
  <text x="290" y="392" text-anchor="middle" font-size="14" fill="#e2e8f0" font-weight="600" font-family="system-ui">PostgreSQL 16 + pgvector</text>
  <text x="290" y="416" text-anchor="middle" font-size="11" fill="#b794f4" font-family="system-ui">HNSW vector index · 1024-dim embeddings</text>
  <text x="290" y="440" text-anchor="middle" font-size="11" fill="#a0aec0" font-family="system-ui">thoughts · memory_audit_log</text>
  <line x1="150" y1="456" x2="430" y2="456" stroke="#4a5568" stroke-width="0.5"/>
  <text x="290" y="476" text-anchor="middle" font-size="10.5" fill="#63b3ed" font-family="system-ui">Embeddings generated via Amazon Bedrock (Nova 2 Multimodal)</text>

</svg>
